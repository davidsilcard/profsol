server {
    listen 80;
    server_name profsol.moven.cloud;

    client_max_body_size 25M;

    location /static/ {
        alias /srv/profsol/current/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /srv/profsol/current/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        include proxy_params;
        proxy_pass http://unix:/run/profsol/profsol.sock;
        proxy_read_timeout 300;
        proxy_connect_timeout 60;
        proxy_send_timeout 300;
    }
}
